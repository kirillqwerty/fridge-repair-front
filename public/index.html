<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1e6fdb" />
    <meta
      name="description"
      content="Ремонт холодильников в Минске на дому. Выезд за 30 минут, гарантия 1 год, работаем без выходных 8:00-22:00."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="/favicon.ico?v=2" sizes="any" />
    <link rel="preload" as="image" href="/assets/fridge-loader.gif" />
    <link rel="preload" as="image" href="/assets/fridge-repair-hero.svg" />

    <title>
      Ремонт холодильников в Минске — выезд за 30 минут, гарантия 1 год
    </title>
    <script>
      window.addEventListener(
        "error",
        function (e) {
          if (
            e.error instanceof DOMException &&
            e.error.name === "DataCloneError" &&
            e.message &&
            e.message.includes("PerformanceServerTiming")
          ) {
            e.stopImmediatePropagation();
            e.preventDefault();
          }
        },
        true,
      );
    </script>
  </head>
  <body>
    <noscript>Для работы сайта требуется JavaScript.</noscript>
    <div id="root"></div>
  </body>
</html>
